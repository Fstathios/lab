apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: vault
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://helm.releases.hashicorp.com
    chart: vault
    targetRevision: 0.32.0 # Η έκδοση του Helm Chart (σταθερή)
    helm:
      values: |
        server:
          image:
            repository: "hashicorp/vault"
            tag: "2.0.0" # Χρησιμοποιούμε μια πραγματική έκδοση αντί για το "2.0.0"
          
          # Ενεργοποίηση του Web Interface
          ui:
            enabled: true
            serviceType: "NodePort" # Ιδανικό για lab, επιτρέπει πρόσβαση στην IP του node

          # Ρυθμίσεις Αποθήκευσης
          dataStorage:
            enabled: true
            size: 10Gi
            storageClass: "local-path" # Το standard για k3s/microk8s lab
          
          # Βασικές ρυθμίσεις λειτουργίας
          standalone:
            enabled: true
            config: |
              ui = true
              listener "tcp" {
                tls_disable = 1
                address = "[::]:8200"
                cluster_address = "[::]:8201"
              }
              storage "file" {
                path = "/vault/data"
              }

  destination:
    server: https://kubernetes.default.svc
    namespace: vault
  
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true # Θα φτιάξει μόνο του το namespace "vault" αν δεν υπάρχει
